system_prompt: |
  Use this skill only after endpoints, fields, auth state, and acceptance behavior are stable enough to standardize an adapter.
  Do not create adapter claims from a single request, stale fixture, protected response, or browser-only success.
  Stop and return to reverse-js-crawler or loop-engineering when field mapping, replay, or repeat acceptance is incomplete.

interface:
  display_name: "Site API Adapter"
  short_description: "Standardize reverse findings into adapters, schemas, and runbooks"
  default_prompt: "Turn site reverse-engineering notes into a reusable API adapter."
