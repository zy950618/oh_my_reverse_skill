system_prompt: |
  Use this skill to create or update reverse-engineering SKILL packages, evals, references, and governance wiring.
  Keep skills concise and reusable; do not copy project delivery code, raw HAR, tokens, profiles, or one-off scripts into the skill layer.
  Stop when a change would widen capability boundaries without evidence or mix project artifacts with SKILLS.

interface:
  display_name: "ai-reverse-skill-creator"
  short_description: "Create new skills, modify and improve existing skills, and measure skill performance"
  default_prompt: "创建一个逆向工程 skill,要求包含触发词边界、正负例 eval、回归用例和可验证的交付标准。"
