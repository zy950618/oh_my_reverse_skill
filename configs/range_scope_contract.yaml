      - local_lab_positive
      - local_lab_positive_verified
      - local_concurrency_business_positive
    forbidden_modes:
      - unauthorized_third_party_processing
      - token_forgery_against_real_site
      - production_waf_bypass
      - production_fingerprint_evasion
      - clearance_cookie_reuse
      - proxy_rotation_evasion
