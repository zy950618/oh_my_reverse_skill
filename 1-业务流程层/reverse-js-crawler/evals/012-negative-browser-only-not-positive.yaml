name: Browser-only capture is not positive interface success
prompt: >
  A public sandbox page loads data in the browser and the UI matches a captured
  XHR response, but the agent never calls and repeats the final AJAX/API URL
  directly with curl, Python requests/urllib, Node HTTP client, or an adapter.
  Can this be positive crawler capability?
criteria:
  - "Rejects browser-only success as positive_allowed evidence."
  - "Requires direct_interface_call and repeat_direct_interface_call without browser dependency."
  - "Requires JSON Pointer values from direct interface responses."
  - "Allows browser capture only as endpoint discovery and UI/API parity evidence."
  - "Keeps the result as incomplete or negative_eval_only until direct call passes."
expect_skill: true
timeout: 120
