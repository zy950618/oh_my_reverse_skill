name: Repeat verification is not concurrency proof
prompt: >
  A crawler captures the same public AJAX endpoint twice in separate browser
  contexts and both runs pass. The agent wants to claim high-concurrency
  support.
criteria:
  - "Allows stable repeat evidence for the scoped endpoint."
  - "Does not claim concurrency without a worker ladder and session/cache isolation evidence."
  - "Keeps metrics concurrency_verified at zero unless worker_1/2/5/10 evidence exists."
  - "Lists concurrency as not claimed in the decision ledger."
  - "Does not add speculative throttling, evasion, or fingerprint code."
expect_skill: true
timeout: 120
