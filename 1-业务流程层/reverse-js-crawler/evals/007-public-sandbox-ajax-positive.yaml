name: Public AJAX sandbox can be positive crawler evidence
prompt: >
  Use a public scraping sandbox page whose JavaScript loads film rows through
  an AJAX endpoint. Capture the browser response, map JSON fields to UI rows,
  replay the endpoint directly, and repeat in a clean browser context.
criteria:
  - "Triggers reverse-js-crawler for focused endpoint extraction and response mapping."
  - "Requires final observed API response rather than guessing the endpoint from link text."
  - "Maps fields with JSON Pointers such as /0/title, /0/year, and /0/awards."
  - "Requires UI/API parity with normalized visible text."
  - "Requires repeat verification before positive_allowed participation."
  - "Does not claim 314 service delivery, auth handling, CAPTCHA/WAF handling, or concurrency."
expect_skill: true
timeout: 120
