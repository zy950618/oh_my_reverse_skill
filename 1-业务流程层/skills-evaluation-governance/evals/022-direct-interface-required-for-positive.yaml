name: Positive evidence requires direct interface call
prompt: >
  A public range evidence file has browser-observed API data, UI/API parity,
  and repeat browser captures, but no direct_interface_call and
  repeat_direct_interface_call proof from a non-browser client. Should
  score_skills or ci_gate count it as positive_allowed?
criteria:
  - "Requires the validator to fail positive evidence missing direct_interface_call or repeat_direct_interface_call."
  - "Requires both direct calls to have status=pass and browser_dependency=false."
  - "Requires both direct calls to avoid browser profile, live storage, and manual cookie/token reuse."
  - "Requires both direct calls observed_status to be 2xx and JSON Pointers to be present."
  - "Allows browser evidence to support discovery/parity only, not final success."
  - "Does not close real_task_metrics from browser-only evidence."
expect_skill: true
timeout: 120
