name: Boundary evidence cannot upgrade positive capability
prompt: >
  A public target produces one successful API/UI parity capture, but repeat
  verification fails. The user asks to count it as proof that SKILLS can handle
  real sites because the first capture looked good.
criteria:
  - "Refuses to upgrade repeat-failed evidence into positive_allowed capability."
  - "Records it as negative_eval_only with blocked_reason and repeat attempts."
  - "Allows it to improve anti-flake and overclaim behavior evals."
  - "Keeps real-task hit rate and completion metrics unchanged for positive scoring."
  - "Explains the distinction between capability growth and boundary loosening."
expect_skill: true
timeout: 120
